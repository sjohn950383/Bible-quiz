<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Chapters Extra Practice</title>
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #FFB300;
            --background: #F4F7F9;
            --text: #2C3E50;
        }

        body {
            margin: 0;
            padding: 24px 16px 40px;
            background: linear-gradient(180deg, #f4f7f9 0%, #eef4fb 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 920px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 18px;
            padding: 22px 20px 26px;
            box-shadow: 0 16px 40px rgba(44, 62, 80, 0.08);
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin: 8px 0 6px;
            font-size: 2rem;
        }

        .subtitle {
            color: #7F8C8D;
            margin-bottom: 18px;
            font-size: 1.05rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        @media (max-width: 550px) {
            .menu-grid { grid-template-columns: 1fr; }
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.05rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background-color: #357ABD;
            transform: translateY(-2px);
        }

        .btn-orange { background-color: var(--secondary); color: #2C3E50; grid-column: span 2; }
        .btn-orange:hover { background-color: #FF9800; }

        .btn-home {
            display: inline-block;
            background: var(--secondary);
            color: #2C3E50;
            text-decoration: none;
            font-weight: 700;
            padding: 12px 16px;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(255, 179, 0, 0.22);
        }

        .top-bar {
            display: flex;
            justify-content: flex-start;
            margin: 0 auto 16px;
            max-width: 920px;
        }

        .bottom-bar {
            display: flex;
            justify-content: flex-start;
            margin: 22px auto 0;
            max-width: 920px;
        }

        @media (max-width: 640px) {
            body {
                padding: 14px 10px 28px;
            }

            .container {
                padding: 18px 14px 22px;
                border-radius: 14px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .btn-orange { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="top-bar"><a class="btn-home" href="index.html">Back to Home</a></div>

    <div class="container">
        <h1>Extra 1 Corinthian Practice</h1>
        <div class="menu-grid">
            <button class="btn" onclick="window.location.href='EXTRA/1cor1.html'">Chapter 1</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor2.html'">Chapter 2</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor3.html'">Chapter 3</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor4.html'">Chapter 4</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor5.html'">Chapter 5</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor6.html'">Chapter 6</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor7.html'">Chapter 7</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor8.html'">Chapter 8</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor9.html'">Chapter 9</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor10.html'">Chapter 10</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor11.html'">Chapter 11</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor12.html'">Chapter 12</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor13.html'">Chapter 13</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor14.html'">Chapter 14</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor15.html'">Chapter 15</button>
            <button class="btn" onclick="window.location.href='EXTRA/1Cor16.html'">Chapter 16</button>
        </div>
    </div>

    <div class="bottom-bar"><a class="btn-home" href="index.html">Back to Home</a></div>
</body>
</html>
