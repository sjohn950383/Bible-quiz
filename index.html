<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Corinthians Bible Quiz 2026</title>
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #FFB300;
            --success: #2ECC71;
            --danger: #E74C3C;
            --background: #F4F7F9;
            --text: #2C3E50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 2.2rem;
        }

        .subtitle {
            color: #7F8C8D;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        @media(max-width: 550px) {
            .menu-grid { grid-template-columns: 1fr; }
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #357ABD;
            transform: translateY(-2px);
        }

        .btn-orange { background-color: var(--secondary); color: #2C3E50; grid-column: span 2; }
        .btn-orange:hover { background-color: #FF9800; }

        .btn-danger { background-color: #95A5A6; color: white; margin-top: 10px; font-size: 0.95rem; padding: 10px 15px; }
        .btn-danger:hover { background-color: #7F8C8D; }
        
        @media(max-width: 550px) {
            .btn-orange { grid-column: span 1; }
        }

        .hidden { display: none !important; }

        .progress-bar {
            background-color: #E0E0E0;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress {
            background-color: var(--success);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.4;
            text-align: left;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #F8F9FA;
            border: 2px solid #E2E8F0;
            padding: 14px 20px;
            border-radius: 8px;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            font-weight: 500;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #EDF2F7;
            border-color: #CBD5E0;
        }

        .option-btn.correct {
            background-color: #D4EDDA !important;
            border-color: var(--success) !important;
            color: #155724 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #F8D7DA !important;
            border-color: var(--danger) !important;
            color: #721C24 !important;
        }

        .feedback-box {
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: left;
        }

        .score-banner {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .stats {
            font-size: 1.3rem;
            margin-bottom: 25px;
            color: #7F8C8D;
        }

        .quiz-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            border-top: 2px dashed #E2E8F0;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container" id="menu-screen">
        <h1>📖 1 Corinthians Quiz</h1>
        <p class="subtitle">Study Guide Practice</p>
        <div class="menu-grid">
            <button class="btn" onclick="startQuiz('ch1-2')">Chapters 1 & 2</button>
            <button class="btn" onclick="startQuiz('ch3-4')">Chapters 3 & 4</button>
            <button class="btn" onclick="startQuiz('ch5-6')">Chapters 5 & 6</button>
            <button class="btn" onclick="startQuiz('ch7-8')">Chapters 7 & 8</button>
            <button class="btn" onclick="startQuiz('ch9-10')">Chapters 9 & 10</button>
            <button class="btn" onclick="startQuiz('ch11-12')">Chapters 11 & 12</button>
            <button class="btn" onclick="startQuiz('ch13-14')">Chapters 13 & 14</button>
            <button class="btn" onclick="startQuiz('ch15-16')">Chapters 15 & 16</button>
            <button class="btn btn-orange" onclick="startQuiz('all')">🌟 All Chapters Mix</button>
        </div>
    </div>
    <div style="height:24px"></div>
    <div class="container" id="menu-screen-c2">
        <h1>📖 2 Corinthians Quiz</h1>
        <p class="subtitle">Study Guide Practice</p>
        <div class="menu-grid">
            <button class="btn" onclick="startQuizC2('Ch1')">Chapter 1</button>
            <button class="btn" onclick="startQuizC2('Ch2')">Chapter 2</button>
            <button class="btn" onclick="startQuizC2('Ch3')">Chapter 3</button>
            <button class="btn" onclick="startQuizC2('Ch4')">Chapter 4</button>
            <button class="btn" onclick="startQuizC2('Ch5')">Chapter 5</button>
            <button class="btn" onclick="startQuizC2('Ch6')">Chapter 6</button>
            <button class="btn" onclick="startQuizC2('Ch7')">Chapter 7</button>
            <button class="btn" onclick="startQuizC2('Ch8')">Chapter 8</button>
            <button class="btn" onclick="startQuizC2('Ch9')">Chapter 9</button>
            <button class="btn" onclick="startQuizC2('Ch10')">Chapter 10</button>
            <button class="btn" onclick="startQuizC2('Ch11')">Chapter 11</button>
            <button class="btn" onclick="startQuizC2('Ch12')">Chapter 12</button>
            <button class="btn" onclick="startQuizC2('Ch13')">Chapter 13</button>
            <button class="btn btn-orange" onclick="startQuizC2('all')">🌟 All Chapters Mix</button>
        </div>
    </div>
    

    <div class="container hidden" id="quiz-screen">
        <div class="progress-bar"><div class="progress" id="progress-indicator"></div></div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: #7F8C8D;">
            <span id="question-counter">Question 1</span>
            <span id="live-score">Score: 0</span>
        </div>
        <div class="question-text" id="question-container">Question placeholder text</div>
        <div class="options-list" id="options-container"></div>
        <div class="feedback-box hidden" id="feedback-container"></div>
        
        <div class="quiz-actions">
            <button class="btn btn-danger" onclick="showMenu()">🏠 Exit to Home Page</button>
            <button class="btn hidden" id="prev-btn" onclick="previousQuestion()">⬅️ Previous</button>
            <button class="btn" id="next-btn" onclick="nextQuestion()">Next Question ➡️</button>
        </div>
    </div>

    <div class="container hidden" id="result-screen">
        <div class="score-banner">🎉 Study Run Complete!</div>
        <div class="stats" id="final-stats">You got 0 out of 0 questions right!</div>
        <button class="btn" onclick="showMenu()">🏠 Back to Main Menu</button>
    </div>

    <script>
        let questionsDatabase = {};
        let currentQuestions = [];
        let activeQuestionIndex = 0;
        let runningScore = 0;
        let currentCategory = '';

        // Safely fetch your custom wrapped JSON data structure on page load
        fetch('questions.json')
            .then(response => response.json())
            .then(data => {
                if (data && data.questionsDatabase) {
                    questionsDatabase = data.questionsDatabase;
                }
            })
            .catch(error => {
                console.error('Error parsing quiz database:', error);
            });

        function startQuizC2(chapter) {
                // Load a single chapter file from C2/ and start the quiz
                function normalizeKey(k) { return k ? String(k).toLowerCase() : k; }
                function extractQuestions(data, chapterKey) {
                    if (!data) return [];
                    if (Array.isArray(data)) return data;
                    if (Array.isArray(data.questions)) return data.questions;
                    // support files that wrap with questionsDatabase: { ch1: [...] }
                    if (data.questionsDatabase && typeof data.questionsDatabase === 'object') {
                        if (chapterKey) {
                            const wanted = normalizeKey(chapterKey);
                            // try direct key
                            if (Array.isArray(data.questionsDatabase[wanted])) return data.questionsDatabase[wanted];
                            // try matching ignoring case
                            for (let k in data.questionsDatabase) {
                                if (normalizeKey(k) === wanted && Array.isArray(data.questionsDatabase[k])) return data.questionsDatabase[k];
                            }
                        }
                        // if no chapterKey or not found, concat all arrays inside questionsDatabase
                        let out = [];
                        for (let k in data.questionsDatabase) {
                            if (Array.isArray(data.questionsDatabase[k])) out = out.concat(data.questionsDatabase[k]);
                        }
                        if (out.length) return out;
                    }
                    // fallback: collect any array values
                    let out = [];
                    for (let k in data) {
                        if (Array.isArray(data[k])) out = out.concat(data[k]);
                    }
                    return out;
                }

                if (chapter === 'all') {
                    const files = ['Ch1','Ch2','Ch3','Ch4','Ch5','Ch6','Ch7','Ch8','Ch9','Ch10','Ch11','Ch12','Ch13'];
                    const fetches = files.map(f => fetch(`C2/${f}.json`).then(r => r.ok ? r.json() : null).catch(()=>null));
                    Promise.all(fetches).then(results => {
                        let combined = [];
                        results.forEach(data => {
                            if (!data) return;
                            let arr = extractQuestions(data);
                            if (arr && arr.length) combined = combined.concat(arr);
                        });
                        if (combined.length === 0) { alert('No questions found in C2 folder.'); return; }
                        currentQuestions = combined.map(q => ({
                            q: q.q || q.question || '',
                            a: q.a || q.answer || '',
                            o: [...(q.o || q.options || [])],
                            ref: q.ref || '',
                            shuffledOptions: [...(q.o || q.options || [])].sort(() => Math.random() - 0.5),
                            userAnswer: null
                        }));
                        currentQuestions.sort(() => Math.random() - 0.5);
                        activeQuestionIndex = 0;
                        runningScore = 0;
                        currentCategory = 'C2/all';
                        document.getElementById('menu-screen').classList.add('hidden');
                        const c2menu = document.getElementById('menu-screen-c2'); if (c2menu) c2menu.classList.add('hidden');
                        document.getElementById('result-screen').classList.add('hidden');
                        document.getElementById('quiz-screen').classList.remove('hidden');
                        displayQuestion();
                    }).catch(err => { console.error(err); alert('Error loading C2 files.'); });
                    return;
                }

                const path = `C2/${chapter}.json`;
                fetch(path)
                    .then(response => {
                        if (!response.ok) throw new Error('Network response was not ok');
                        return response.json();
                    })
                    .then(data => {
                        let arr = extractQuestions(data, chapter);
                        if (!arr || arr.length === 0) {
                            alert('No questions found in ' + path);
                            return;
                        }
                        currentQuestions = arr.map(q => ({
                            q: q.q || q.question || '',
                            a: q.a || q.answer || '',
                            o: [...(q.o || q.options || [])],
                            ref: q.ref || '',
                            shuffledOptions: [...(q.o || q.options || [])].sort(() => Math.random() - 0.5),
                            userAnswer: null
                        }));
                        currentQuestions.sort(() => Math.random() - 0.5);
                        activeQuestionIndex = 0;
                        runningScore = 0;
                        currentCategory = `C2/${chapter}`;
                        document.getElementById('menu-screen').classList.add('hidden');
                        const c2menu = document.getElementById('menu-screen-c2'); if (c2menu) c2menu.classList.add('hidden');
                        document.getElementById('result-screen').classList.add('hidden');
                        document.getElementById('quiz-screen').classList.remove('hidden');
                        displayQuestion();
                    })
                    .catch(error => {
                        console.error('Error loading chapter:', error);
                        alert('Could not load chapter file: ' + path);
                    });
        }

        function startQuiz(category) {
            // Defensive check to ensure data has completely loaded from the JSON file
            if (!questionsDatabase || (category !== 'all' && !questionsDatabase[category])) {
                alert('Quiz data is still initializing. Please wait a brief moment and try again.');
                return;
            }

            currentCategory = category;
            document.getElementById('menu-screen').classList.add('hidden');
            const c2menu = document.getElementById('menu-screen-c2'); if (c2menu) c2menu.classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            let saved = localStorage.getItem('quiz_progress_' + category);
            if (saved) {
                try {
                    let progress = JSON.parse(saved);
                    currentQuestions = progress.currentQuestions;
                    activeQuestionIndex = progress.activeQuestionIndex;
                    runningScore = progress.runningScore;
                } catch (e) {
                    initNewQuiz(category);
                }
            } else {
                initNewQuiz(category);
            }
            
            displayQuestion();
        }

        function initNewQuiz(category) {
            if (category === 'all') {
                currentQuestions = [];
                for (let cat in questionsDatabase) {
                    let copied = questionsDatabase[cat].map(q => ({
                        q: q.q,
                        a: q.a,
                        o: [...q.o],
                        ref: q.ref || '',
                        shuffledOptions: [...q.o].sort(() => Math.random() - 0.5),
                        userAnswer: null
                    }));
                    currentQuestions = currentQuestions.concat(copied);
                }
            } else {
                currentQuestions = questionsDatabase[category].map(q => ({
                    q: q.q,
                    a: q.a,
                    o: [...q.o],
                    ref: q.ref || '',
                    shuffledOptions: [...q.o].sort(() => Math.random() - 0.5),
                    userAnswer: null
                }));
            }
            
            currentQuestions.sort(() => Math.random() - 0.5);

            activeQuestionIndex = 0;
            runningScore = 0;
        }

        function saveProgress() {
            if (currentCategory) {
                let state = {
                    currentQuestions: currentQuestions,
                    activeQuestionIndex: activeQuestionIndex,
                    runningScore: runningScore
                };
                localStorage.setItem('quiz_progress_' + currentCategory, JSON.stringify(state));
            }
        }

        function displayQuestion() {
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('feedback-container').classList.add('hidden');
            
            let qData = currentQuestions[activeQuestionIndex];
            
            document.getElementById('question-counter').innerText = `Question ${activeQuestionIndex + 1} of ${currentQuestions.length}`;
            document.getElementById('live-score').innerText = `Score: ${runningScore}`;
            document.getElementById('question-container').innerText = qData.q;
            
            let percentage = (activeQuestionIndex / currentQuestions.length) * 100;
            document.getElementById('progress-indicator').style.width = `${percentage}%`;

            let optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            let optionsShuffled = qData.shuffledOptions;

            optionsShuffled.forEach(option => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => verifyAnswer(btn, option, qData.a);
                optionsContainer.appendChild(btn);
            });

            if (qData.userAnswer !== null) {
                let options = optionsContainer.querySelectorAll('.option-btn');
                options.forEach(btn => {
                    btn.disabled = true;
                    if (btn.innerText === qData.a) {
                        btn.classList.add('correct');
                    }
                    if (btn.innerText === qData.userAnswer && btn.innerText !== qData.a) {
                        btn.classList.add('wrong');
                    }
                });

                let feedbackBox = document.getElementById('feedback-container');
                feedbackBox.classList.remove('hidden');
                
                // Formulate text utilizing your new "ref" field cleanly
                let refText = qData.ref ? ` (${qData.ref})` : '';
                if (qData.userAnswer === qData.a) {
                    feedbackBox.className = 'feedback-box correct';
                    feedbackBox.innerText = `🌟 Great job! That's correct!${refText}`;
                } else {
                    feedbackBox.className = 'feedback-box wrong';
                    feedbackBox.innerText = `👉 Oops! The right answer was: ${qData.a}${refText}`;
                }
                document.getElementById('next-btn').classList.remove('hidden');
            }

            saveProgress();
        }

        function verifyAnswer(selectedBtn, selectedText, correctValue) {
            let qData = currentQuestions[activeQuestionIndex];
            qData.userAnswer = selectedText;

            let options = document.querySelectorAll('.option-btn');
            options.forEach(btn => btn.disabled = true);

            let feedbackBox = document.getElementById('feedback-container');
            feedbackBox.classList.remove('hidden');

            let refText = qData.ref ? ` (${qData.ref})` : '';

            if (selectedText === correctValue) {
                selectedBtn.classList.add('correct');
                feedbackBox.className = 'feedback-box correct';
                feedbackBox.innerText = `🌟 Great job! That's correct!${refText}`;
                runningScore++;
            } else {
                selectedBtn.classList.add('wrong');
                feedbackBox.className = 'feedback-box wrong';
                feedbackBox.innerText = `👉 Oops! The right answer was: ${correctValue}${refText}`;
                
                options.forEach(btn => {
                    if(btn.innerText === correctValue) btn.classList.add('correct');
                });
            }

            document.getElementById('live-score').innerText = `Score: ${runningScore}`;
            document.getElementById('next-btn').classList.remove('hidden');

            // show previous button when not on first question
            if (activeQuestionIndex > 0) {
                document.getElementById('prev-btn').classList.remove('hidden');
            } else {
                document.getElementById('prev-btn').classList.add('hidden');
            }

            saveProgress();
        }

        function nextQuestion() {
            activeQuestionIndex++;
            if (activeQuestionIndex < currentQuestions.length) {
                displayQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (activeQuestionIndex > 0) {
                activeQuestionIndex--;
                displayQuestion();
            }
        }

        function showResults() {
            if (currentCategory) {
                localStorage.removeItem('quiz_progress_' + currentCategory);
            }
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-stats').innerText = `Awesome effort! You scored ${runningScore} out of ${currentQuestions.length} correctly!`;
        }

        function showMenu() {
            currentQuestions = [];
            activeQuestionIndex = 0;
            runningScore = 0;
            currentCategory = '';
            
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            const c2menu = document.getElementById('menu-screen-c2'); if (c2menu) c2menu.classList.remove('hidden');
        }
    </script>
</body>
</html>
