<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 & 2 Corinthians Bible Quiz 2026</title>
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #FFB300;
            --success: #2ECC71;
            --danger: #E74C3C;
            --background: #F4F7F9;
            --text: #2C3E50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 2.2rem;
        }

        .subtitle {
            color: #7F8C8D;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        @media(max-width: 550px) {
            .menu-grid { grid-template-columns: 1fr; }
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #357ABD;
            transform: translateY(-2px);
        }

        .btn-orange { background-color: var(--secondary); color: #2C3E50; grid-column: span 2; }
        .btn-orange:hover { background-color: #FF9800; }

        .btn-danger { background-color: #95A5A6; color: white; margin-top: 10px; font-size: 0.95rem; padding: 10px 15px; }
        .btn-danger:hover { background-color: #7F8C8D; }
        
        @media(max-width: 550px) {
            .btn-orange { grid-column: span 1; }
        }

        .hidden { display: none !important; }

        .progress-bar {
            background-color: #E0E0E0;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress {
            background-color: var(--success);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.4;
            text-align: left;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #F8F9FA;
            border: 2px solid #E2E8F0;
            padding: 14px 20px;
            border-radius: 8px;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            font-weight: 500;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #EDF2F7;
            border-color: #CBD5E0;
        }

        .option-btn.correct {
            background-color: #D4EDDA !important;
            border-color: var(--success) !important;
            color: #155724 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #F8D7DA !important;
            border-color: var(--danger) !important;
            color: #721C24 !important;
        }

        .feedback-box {
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: left;
        }

        .score-banner {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .stats {
            font-size: 1.3rem;
            margin-bottom: 25px;
            color: #7F8C8D;
        }

        .quiz-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            border-top: 2px dashed #E2E8F0;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container" id="menu-screen-new-practice">
        <h1>📖 New 1 Corinthians Practice</h1>
        <div class="menu-grid" style="grid-template-columns: 1fr;">
            <button class="btn" style="width:100%;" onclick="window.location.href='all-chapters-extra-practice.html'">New 1 Corinthians Practice</button>
        </div>
    </div>
    <div style="height:18px"></div>
    <button id="past-practice-toggle" class="btn btn-orange" style="width:100%; max-width:750px; display:block; margin:0 auto 0;" onclick="togglePastPractice()">Past practice</button>
    <div style="height:18px"></div>

    <div id="past-practice-section" class="hidden">
        <div class="container" id="menu-screen-study-guide">
            <h1>📖 1 Corinthians Study Guide</h1>
            <p class="subtitle">Grouped chapter practice</p>
            <div class="menu-grid">
                <button class="btn" onclick="startQuiz('ch1-2')">Chapters 1 and 2</button>
                <button class="btn" onclick="startQuiz('ch3-4')">Chapters 3 and 4</button>
                <button class="btn" onclick="startQuiz('ch5-6')">Chapters 5 and 6</button>
                <button class="btn" onclick="startQuiz('ch7-8')">Chapters 7 and 8</button>
                <button class="btn" onclick="startQuiz('ch9-10')">Chapters 9 and 10</button>
                <button class="btn" onclick="startQuiz('ch11-12')">Chapters 11 and 12</button>
                <button class="btn" onclick="startQuiz('ch13-14')">Chapters 13 and 14</button>
                <button class="btn" onclick="startQuiz('ch15-16')">Chapters 15 and 16</button>
                <button class="btn btn-orange" onclick="startQuiz('all')">🌟 All Chapters Mix</button>
            </div>
        </div>
        <div style="height:24px"></div>
        <div class="container" id="menu-screen-extra-practice">
            <h1>📖 1 Corinthians Extra Practice</h1>
            <p class="subtitle">Study Guide Practice</p>
            <div class="menu-grid">
                <button class="btn" onclick="startQuizC1('Ch1')">Chapter 1</button>
                <button class="btn" onclick="startQuizC1('Ch2')">Chapter 2</button>
                <button class="btn" onclick="startQuizC1('Ch3')">Chapter 3</button>
                <button class="btn" onclick="startQuizC1('Ch4')">Chapter 4</button>
                <button class="btn" onclick="startQuizC1('Ch5')">Chapter 5</button>
                <button class="btn" onclick="startQuizC1('Ch6')">Chapter 6</button>
                <button class="btn" onclick="startQuizC1('Ch7')">Chapter 7</button>
                <button class="btn" onclick="startQuizC1('Ch8')">Chapter 8</button>
                <button class="btn" onclick="startQuizC1('Ch9')">Chapter 9</button>
                <button class="btn" onclick="startQuizC1('Ch10')">Chapter 10</button>
                <button class="btn" onclick="startQuizC1('Ch11')">Chapter 11</button>
                <button class="btn" onclick="startQuizC1('Ch12')">Chapter 12</button>
                <button class="btn" onclick="startQuizC1('Ch13')">Chapter 13</button>
                <button class="btn" onclick="startQuizC1('Ch14')">Chapter 14</button>
                <button class="btn" onclick="startQuizC1('Ch15')">Chapter 15</button>
                <button class="btn" onclick="startQuizC1('Ch16')">Chapter 16</button>
                <button class="btn btn-orange" onclick="startQuizC1('all')">🌟 All Chapters Mix</button>
            </div>
        </div>
        <div style="height:24px"></div>
        <div class="container" id="menu-screen-c2">
            <h1>📖 2 Corinthians Quiz</h1>
            <p class="subtitle">Study Guide Practice</p>
            <div class="menu-grid">
                <button class="btn" onclick="startQuizC2('Ch1')">Chapter 1</button>
                <button class="btn" onclick="startQuizC2('Ch2')">Chapter 2</button>
                <button class="btn" onclick="startQuizC2('Ch3')">Chapter 3</button>
                <button class="btn" onclick="startQuizC2('Ch4')">Chapter 4</button>
                <button class="btn" onclick="startQuizC2('Ch5')">Chapter 5</button>
                <button class="btn" onclick="startQuizC2('Ch6')">Chapter 6</button>
                <button class="btn" onclick="startQuizC2('Ch7')">Chapter 7</button>
                <button class="btn" onclick="startQuizC2('Ch8')">Chapter 8</button>
                <button class="btn" onclick="startQuizC2('Ch9')">Chapter 9</button>
                <button class="btn" onclick="startQuizC2('Ch10')">Chapter 10</button>
                <button class="btn" onclick="startQuizC2('Ch11')">Chapter 11</button>
                <button class="btn" onclick="startQuizC2('Ch12')">Chapter 12</button>
                <button class="btn" onclick="startQuizC2('Ch13')">Chapter 13</button>
                <button class="btn btn-orange" onclick="startQuizC2('all')">🌟 All Chapters Mix</button>
            </div>
        </div>
        <div style="height:24px"></div>
    </div>
    <div class="container hidden" id="quiz-screen">
        <div class="progress-bar"><div class="progress" id="progress-indicator"></div></div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: #7F8C8D;">
            <span id="question-counter">Question 1</span>
            <span id="live-score">Score: 0</span>
        </div>
        <div class="question-text" id="question-container">Question placeholder text</div>
        <div class="options-list" id="options-container"></div>
        <div class="feedback-box hidden" id="feedback-container"></div>
        
        <div class="quiz-actions">
            <button class="btn btn-danger" onclick="showMenu()">🏠 Exit to Home Page</button>
            <button class="btn hidden" id="prev-btn" onclick="previousQuestion()">⬅️ Previous</button>
            <button class="btn" id="next-btn" onclick="nextQuestion()">Next Question ➡️</button>
        </div>
    </div>

    <div class="container hidden" id="result-screen">
        <div class="score-banner">🎉 Study Run Complete!</div>
        <div class="stats" id="final-stats">You got 0 out of 0 questions right!</div>
        <button class="btn" onclick="showMenu()">🏠 Back to Main Menu</button>
    </div>

    <script>
        let questionsDatabase = {};
        let currentQuestions = [];
        let activeQuestionIndex = 0;
        let runningScore = 0;
        let currentCategory = '';

        // Safely fetch your custom wrapped JSON data structure on page load
        fetch('questions.json')
            .then(response => response.json())
            .then(data => {
                if (data && data.questionsDatabase) {
                    questionsDatabase = data.questionsDatabase;
                }
            })
            .catch(error => {
                console.error('Error parsing quiz database:', error);
            });

        function normalizeKey(k) {
            return k ? String(k).toLowerCase() : k;
        }

        function extractQuestions(data, chapterKey) {
            if (!data) return [];
            if (Array.isArray(data)) return data;
            if (Array.isArray(data.questions)) return data.questions;
            if (data.questionsDatabase && typeof data.questionsDatabase === 'object') {
                if (chapterKey) {
                    const wanted = normalizeKey(chapterKey);
                    if (Array.isArray(data.questionsDatabase[wanted])) return data.questionsDatabase[wanted];
                    for (let k in data.questionsDatabase) {
                        if (normalizeKey(k) === wanted && Array.isArray(data.questionsDatabase[k])) return data.questionsDatabase[k];
                    }
                }

                let out = [];
                for (let k in data.questionsDatabase) {
                    if (Array.isArray(data.questionsDatabase[k])) out = out.concat(data.questionsDatabase[k]);
                }
                if (out.length) return out;
            }

            let out = [];
            for (let k in data) {
                if (Array.isArray(data[k])) out = out.concat(data[k]);
            }
            return out;
        }

        function mapQuestions(rawQuestions) {
            return rawQuestions.map(q => ({
                q: q.q || q.question || '',
                a: q.a || q.answer || '',
                o: [...(q.o || q.options || [])],
                ref: q.ref || '',
                shuffledOptions: [...(q.o || q.options || [])].sort(() => Math.random() - 0.5),
                userAnswer: null
            }));
        }

        function showQuizScreen() {
            const pastPracticeToggle = document.getElementById('past-practice-toggle');
            if (pastPracticeToggle) pastPracticeToggle.classList.add('hidden');
            const pastPracticeSection = document.getElementById('past-practice-section');
            if (pastPracticeSection) pastPracticeSection.classList.add('hidden');
            const extraPracticeMenu = document.getElementById('menu-screen-extra-practice'); if (extraPracticeMenu) extraPracticeMenu.classList.add('hidden');
            const studyGuideMenu = document.getElementById('menu-screen-study-guide');
            if (studyGuideMenu) studyGuideMenu.classList.add('hidden');
            const c2menu = document.getElementById('menu-screen-c2'); if (c2menu) c2menu.classList.add('hidden');
            const newPracticeMenu = document.getElementById('menu-screen-new-practice'); if (newPracticeMenu) newPracticeMenu.classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
        }

        function fetchJsonWithFallback(paths) {
            const tryFetch = (index) => {
                if (index >= paths.length) return Promise.resolve(null);
                const path = paths[index];
                return fetch(path)
                    .then(response => {
                        if (!response.ok) return tryFetch(index + 1);
                        return response.json();
                    })
                    .catch(() => tryFetch(index + 1));
            };

            return tryFetch(0);
        }

        function loadChapterQuiz(folder, chapter, files) {
            if (chapter === 'all') {
                const fetches = files.map(f => fetchJsonWithFallback([
                    `${folder}/${f}.json`,
                    `${folder}/${String(f).toLowerCase()}.json`
                ]));
                Promise.all(fetches).then(results => {
                    let combined = [];
                    results.forEach(data => {
                        if (!data) return;
                        const arr = extractQuestions(data);
                        if (arr && arr.length) combined = combined.concat(arr);
                    });
                    if (combined.length === 0) { alert(`No questions found in ${folder} folder.`); return; }
                    currentQuestions = mapQuestions(combined);
                    currentQuestions.sort(() => Math.random() - 0.5);
                    activeQuestionIndex = 0;
                    runningScore = 0;
                    currentCategory = `${folder}/all`;
                    showQuizScreen();
                    displayQuestion();
                }).catch(err => { console.error(err); alert(`Error loading ${folder} files.`); });
                return;
            }

            const path = `${folder}/${chapter}.json`;
            fetchJsonWithFallback([
                path,
                `${folder}/${String(chapter).toLowerCase()}.json`
            ])
                .then(data => {
                    const arr = extractQuestions(data, chapter);
                    if (!arr || arr.length === 0) {
                        alert('No questions found in ' + path);
                        return;
                    }
                    currentQuestions = mapQuestions(arr);
                    currentQuestions.sort(() => Math.random() - 0.5);
                    activeQuestionIndex = 0;
                    runningScore = 0;
                    currentCategory = `${folder}/${chapter}`;
                    showQuizScreen();
                    displayQuestion();
                })
                .catch(error => {
                    console.error('Error loading chapter:', error);
                    alert('Could not load chapter file: ' + path);
                });
        }

        function startQuizC1(chapter) {
            loadChapterQuiz('C1', chapter, ['Ch1','ch2','ch3','ch4','ch5','ch6','ch7','ch8','ch9','ch10','ch11','ch12','ch13','ch14','ch15','ch16']);
        }

        function startQuizC2(chapter) {
            loadChapterQuiz('C2', chapter, ['Ch1','Ch2','Ch3','Ch4','Ch5','Ch6','Ch7','Ch8','Ch9','Ch10','Ch11','Ch12','Ch13']);
        }

        function togglePastPractice() {
            const section = document.getElementById('past-practice-section');
            const button = document.getElementById('past-practice-toggle');
            const studyGuideMenu = document.getElementById('menu-screen-study-guide');
            const extraPracticeMenu = document.getElementById('menu-screen-extra-practice');
            const c2Menu = document.getElementById('menu-screen-c2');
            if (!section || !button) return;
            const shouldShow = section.classList.contains('hidden');

            section.classList.toggle('hidden', !shouldShow);
            if (studyGuideMenu) studyGuideMenu.classList.toggle('hidden', !shouldShow);
            if (extraPracticeMenu) extraPracticeMenu.classList.toggle('hidden', !shouldShow);
            if (c2Menu) c2Menu.classList.toggle('hidden', !shouldShow);
        }

        function openExtraPractice(chapterNumber) {
            const fileMap = {
                1: '1cor1.html',
                2: '1Cor2.html',
                3: '1Cor3.html',
                4: '1Cor4.html',
                5: '1Cor5.html',
                6: '1Cor6.html',
                7: '1Cor7.html',
                8: '1Cor8.html',
                9: '1Cor9.html',
                10: '1Cor10.html',
                11: '1Cor11.html',
                12: '1Cor12.html',
                13: '1Cor13.html',
                14: '1Cor14.html',
                15: '1Cor15.html',
                16: '1Cor16.html'
            };

            const fileName = fileMap[chapterNumber];
            if (!fileName) {
                alert('Chapter file not found for Extra Practice.');
                return;
            }

            window.location.href = `EXTRA/${fileName}`;
        }

        function startQuiz(category) {
            // Defensive check to ensure data has completely loaded from the JSON file
            if (!questionsDatabase || (category !== 'all' && !questionsDatabase[category])) {
                alert('Quiz data is still initializing. Please wait a brief moment and try again.');
                return;
            }

            currentCategory = category;
            const newPracticeMenu = document.getElementById('menu-screen-new-practice');
            if (newPracticeMenu) newPracticeMenu.classList.add('hidden');
            const pastPracticeToggle = document.getElementById('past-practice-toggle');
            if (pastPracticeToggle) pastPracticeToggle.classList.add('hidden');
            const pastPracticeSection = document.getElementById('past-practice-section');
            if (pastPracticeSection) pastPracticeSection.classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            let saved = localStorage.getItem('quiz_progress_' + category);
            if (saved) {
                try {
                    let progress = JSON.parse(saved);
                    currentQuestions = progress.currentQuestions;
                    activeQuestionIndex = progress.activeQuestionIndex;
                    runningScore = progress.runningScore;
                } catch (e) {
                    initNewQuiz(category);
                }
            } else {
                initNewQuiz(category);
            }
            
            displayQuestion();
        }

        function initNewQuiz(category) {
            if (category === 'all') {
                currentQuestions = [];
                for (let cat in questionsDatabase) {
                    let copied = questionsDatabase[cat].map(q => ({
                        q: q.q,
                        a: q.a,
                        o: [...q.o],
                        ref: q.ref || '',
                        shuffledOptions: [...q.o].sort(() => Math.random() - 0.5),
                        userAnswer: null
                    }));
                    currentQuestions = currentQuestions.concat(copied);
                }
            } else {
                currentQuestions = questionsDatabase[category].map(q => ({
                    q: q.q,
                    a: q.a,
                    o: [...q.o],
                    ref: q.ref || '',
                    shuffledOptions: [...q.o].sort(() => Math.random() - 0.5),
                    userAnswer: null
                }));
            }
            
            currentQuestions.sort(() => Math.random() - 0.5);

            activeQuestionIndex = 0;
            runningScore = 0;
        }

        function saveProgress() {
            if (currentCategory) {
                let state = {
                    currentQuestions: currentQuestions,
                    activeQuestionIndex: activeQuestionIndex,
                    runningScore: runningScore
                };
                localStorage.setItem('quiz_progress_' + currentCategory, JSON.stringify(state));
            }
        }

        function displayQuestion() {
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('feedback-container').classList.add('hidden');
            
            let qData = currentQuestions[activeQuestionIndex];
            
            document.getElementById('question-counter').innerText = `Question ${activeQuestionIndex + 1} of ${currentQuestions.length}`;
            document.getElementById('live-score').innerText = `Score: ${runningScore}`;
            document.getElementById('question-container').innerText = qData.q;
            
            let percentage = (activeQuestionIndex / currentQuestions.length) * 100;
            document.getElementById('progress-indicator').style.width = `${percentage}%`;

            let optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            let optionsShuffled = qData.shuffledOptions;

            optionsShuffled.forEach(option => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => verifyAnswer(btn, option, qData.a);
                optionsContainer.appendChild(btn);
            });

            if (qData.userAnswer !== null) {
                let options = optionsContainer.querySelectorAll('.option-btn');
                options.forEach(btn => {
                    btn.disabled = true;
                    if (btn.innerText === qData.a) {
                        btn.classList.add('correct');
                    }
                    if (btn.innerText === qData.userAnswer && btn.innerText !== qData.a) {
                        btn.classList.add('wrong');
                    }
                });

                let feedbackBox = document.getElementById('feedback-container');
                feedbackBox.classList.remove('hidden');
                
                // Formulate text utilizing your new "ref" field cleanly
                let refText = qData.ref ? ` (${qData.ref})` : '';
                if (qData.userAnswer === qData.a) {
                    feedbackBox.className = 'feedback-box correct';
                    feedbackBox.innerText = `🌟 Great job! That's correct!${refText}`;
                } else {
                    feedbackBox.className = 'feedback-box wrong';
                    feedbackBox.innerText = `👉 Oops! The right answer was: ${qData.a}${refText}`;
                }
                document.getElementById('next-btn').classList.remove('hidden');
            }

            saveProgress();
        }

        function verifyAnswer(selectedBtn, selectedText, correctValue) {
            let qData = currentQuestions[activeQuestionIndex];
            qData.userAnswer = selectedText;

            let options = document.querySelectorAll('.option-btn');
            options.forEach(btn => btn.disabled = true);

            let feedbackBox = document.getElementById('feedback-container');
            feedbackBox.classList.remove('hidden');

            let refText = qData.ref ? ` (${qData.ref})` : '';

            if (selectedText === correctValue) {
                selectedBtn.classList.add('correct');
                feedbackBox.className = 'feedback-box correct';
                feedbackBox.innerText = `🌟 Great job! That's correct!${refText}`;
                runningScore++;
            } else {
                selectedBtn.classList.add('wrong');
                feedbackBox.className = 'feedback-box wrong';
                feedbackBox.innerText = `👉 Oops! The right answer was: ${correctValue}${refText}`;
                
                options.forEach(btn => {
                    if(btn.innerText === correctValue) btn.classList.add('correct');
                });
            }

            document.getElementById('live-score').innerText = `Score: ${runningScore}`;
            document.getElementById('next-btn').classList.remove('hidden');

            // show previous button when not on first question
            if (activeQuestionIndex > 0) {
                document.getElementById('prev-btn').classList.remove('hidden');
            } else {
                document.getElementById('prev-btn').classList.add('hidden');
            }

            saveProgress();
        }

        function nextQuestion() {
            activeQuestionIndex++;
            if (activeQuestionIndex < currentQuestions.length) {
                displayQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (activeQuestionIndex > 0) {
                activeQuestionIndex--;
                displayQuestion();
            }
        }

        function showResults() {
            if (currentCategory) {
                localStorage.removeItem('quiz_progress_' + currentCategory);
            }
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-stats').innerText = `Awesome effort! You scored ${runningScore} out of ${currentQuestions.length} correctly!`;
        }

        function showMenu() {
            currentQuestions = [];
            activeQuestionIndex = 0;
            runningScore = 0;
            currentCategory = '';
            
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            const newPracticeMenu = document.getElementById('menu-screen-new-practice');
            if (newPracticeMenu) newPracticeMenu.classList.remove('hidden');
            const pastPracticeToggle = document.getElementById('past-practice-toggle');
            if (pastPracticeToggle) pastPracticeToggle.classList.remove('hidden');
            const pastPracticeSection = document.getElementById('past-practice-section');
            if (pastPracticeSection) pastPracticeSection.classList.add('hidden');
            const studyGuideMenu = document.getElementById('menu-screen-study-guide');
            if (studyGuideMenu) studyGuideMenu.classList.remove('hidden');
            const extraMenu = document.getElementById('menu-screen-extra-practice'); if (extraMenu) extraMenu.classList.remove('hidden');
